<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="interactive-widget=resize-widget,initial-scale=1,width=width-device">

    <style>

        /*We going to create the animation for the body thanks the at-rules*/
@keyframes changecolor{
    0%{background-position:0% 50%;}
    50%{background-position: 100% 50%;}
    100%{background-position:50% 0%;}
}
        body{
            /*the background size will be in two dimensions*/
            /*navy #000080 ; turqoise #40E0D0 ;pastel blue #AEC6CF,rebeccablue*/
          
            background:linear-gradient(135deg,cyan 20%, #40E0D0 30% , #000080 80%);
            /*The order for the construction to the backround proprieties  is very importante*/
              background-size:400% 400%;
            display:flex;/*i want use  the nxt propriety*/
            flex-direction:column;/*I want  to see the element inside this part like  one column*/
            align-items:center;/*hoizontale axe*/
            justify-content:center;/*verticale axe*/
            /*We're launching the animation each n seconde for the infinity*/
            animation: changecolor 10s infinite;
            margin:0;/*I don't wnt to see my screen shake, with this valeur whathever the movement did by the user my screen will stay static*/
            height:100vh;
            width:100vw;/*even by the default this value is the same*/
        }

        /*Description for the div space */
        div{
            position:relative;/*With the relative value everything tht i put just after like the the style will be for this space, however with absolute i can't use the proprieties like justify-content and align-items*/
            
            background-color:#AEC6CF;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            border-radius:30%; /*Every edge bounding this area will turn into non-right angles.*/
            gap:20px;
            color:grey;
            width:50vw;/*For the half width */
            padding:10px;/*I want a little space between the word inside  my host page and the  verticales bounds*/
        }

        /*style for each button*/

        button{
            background-color:purple;
           
      }
        button:hover{
            background-color:darkblue;
            
          }
        a{text-decoration:none;
          color:grey;}
        
            
            
            
    
    </style>
    <title>Accueil</title>
</head>
    <body>
        <div>
            <h1>ACCUEIL</h1>
            <button>
                <a href="/static/login.html">
                    CONNEXION
            </a></button>
        <button>
            <a href="/static/creation_df.html">
                CREATION DE COMPTE</a>
        </button>
            
        </div>
    </body>

</html>
