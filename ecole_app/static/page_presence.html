<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Présence</title>
    <style>
        :root {
            --present-color: #2ecc71; /* Vert */
            --absent-color: #e74c3c;  /* Rouge */
            --bg-main: #EDC6CF;
        }

        #part1 { display: flex; gap: 20px; padding: 15px; background: white; color: grey; }
        #part2 { 
            display: flex; flex-direction: column; align-items: center; 
            background-color: var(--bg-main); padding: 20px; min-height: 100vh;
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background-color: blue; color: white; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }

        /* Classes de couleurs dynamiques */
        .status-present { background-color: var(--present-color) !important; color: white; }
        .status-absent { background-color: var(--absent-color) !important; color: white; }
        .status-retard { background-color: var(--absent-color) !important; color: white; }
        
        select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; width: 100%; }
    </style>
</head>
<body>

<div id="part1">
    <form id="appel_present">
        <input type="date" id="date_jour" name="date_jour" required>
        <select id="choix_moment" name="horaires" onchange="resetAndReload()" required>
            <option value="debut">Appel (Début de cours)</option>
            <option value="fin">Appel (Fin de cours)</option>
        </select>
</div>

<div id="part2">
    <h1>Page d'appel</h1>
    <table>
        <thead>
            <tr>
                <th>N°</th>
                <th>Nom de l'élève</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="presence_body">
            </tbody>
    </table>
    <button type="submit" style="margin-top:20px; padding: 10px 30px;">Valider l'appel</button>
    </form>
</div>

<script>
    const obj_url = new URLSearchParams(window.location.search);
    const classe_id = obj_url.get("classe_id");
    const cible = document.getElementById("presence_body");
    const momentSelect = document.getElementById("choix_moment");

    // Clé unique pour le stockage local (dépend de la classe et du moment)
    const getStorageKey = () => `appel_${classe_id}_${momentSelect.value}`;

    // 1. Fonction pour appliquer la couleur selon le choix
    function appliquerCouleur(selectElement) {
        const val = selectElement.value;
        selectElement.classList.remove('status-present', 'status-absent', 'status-retard');
        
        if (val === "present") selectElement.classList.add('status-present');
        else if (val === "absent" || val === "retard") selectElement.classList.add('status-absent');
    }

    // 2. Sauvegarde immédiate en LocalStorage (Complexité O(1))
    function sauvegarderSelection(studentId, status) {
        let localData = JSON.parse(localStorage.getItem(getStorageKey()) || "{}");
        localData[studentId] = status;
        localStorage.setItem(getStorageKey(), JSON.stringify(localData));
    }

    // 3. Chargement des données et rendu (Complexité O(n))
    async function chargerAppel() {
        try {
            const res = await fetch(`/display_student_classe/${classe_id}`);
            const students = await res.json();
            
            // Récupérer les données sauvegardées (si coupure de courant)
            const savedData = JSON.parse(localStorage.getItem(getStorageKey()) || "{}");
            
            let html = "";
            students.forEach((student, index) => {
                const savedStatus = savedData[student.id] || "";
                const options = momentSelect.value === "debut" 
                    ? `<option value="">--</option><option value="present" ${savedStatus==='present'?'selected':''}>Présent</option><option value="retard" ${savedStatus==='retard'?'selected':''}>Retard</option>`
                    : `<option value="">--</option><option value="present" ${savedStatus==='present'?'selected':''}>Présent</option><option value="absent" ${savedStatus==='absent'?'selected':''}>Absent</option>`;

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.name_student}</td>
                        <td>
                            <input type="hidden" name="identifiant_eleve" value="${student.id}">
                            <select name="status" onchange="gererChangement(this, '${student.id}')">
                                ${options}
                            </select>
                        </td>
                    </tr>`;
            });
            cible.innerHTML = html;

            // Appliquer les couleurs initiales sur les selects déjà remplis
            document.querySelectorAll('select[name="status"]').forEach(s => appliquerCouleur(s));

        } catch (err) {
            console.error("Erreur chargement:", err);
        }
    }

    // Gère le changement visuel + sauvegarde
    function gererChangement(select, studentId) {
        appliquerCouleur(select);
        sauvegarderSelection(studentId, select.value);
    }

    function resetAndReload() {
        chargerAppel();
    }

    // Envoi final au serveur
    document.getElementById("appel_present").onsubmit = async function(e) {
        e.preventDefault();
        const data = new FormData(this);

        const response = await fetch("/presence_appel", {
            method: "POST",
            body: data
        });

        if (response.ok) {
            alert("Appel enregistré avec succès !");
            localStorage.removeItem(getStorageKey()); // On vide le cache après succès
        }
    };

    window.onload = chargerAppel;
</script>
</body>
</html>
