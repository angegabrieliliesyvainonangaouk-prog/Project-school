<!DOCTYPE html>
<html>
<!objectif fare un tableau dont  chacune des classes sur l'horizontal correspond à une classe  de l'école>
<head>
    <title>STELYSE ALERTE</title>

    <!Before we going to chanfge the browser metadata>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1,interactive-widget=widget,width=device-width">
    

    <style>
        /*We going to create the animtion thanks the at-rule keyframes*/
        @keyframes colorchange {
            /* This animation is calculated based on n percent of the total duration. I am applying a pull force to the object's boundary at coordinates (x, y) with an angle s*/
                0%{background-position:0% 50%;}
                50%{background-position:100% 50%;}
                100%{background-position:50% 0%;}}
            /*not putting the  position at the maximal time , i won't see the direction change abruptly*/

        body{
            background-size:400% 400%;/*It means the background has 5 times the size of user device screen,this is a square*/
            background-image:linear-gradient(135deg,#6050DC 25%,navy 35%,turquoise 70%);/*The standard deviation are the swicth periods*/
            animation:colorchange 10s infinite;
            display:flex;
            flex-direction:column;
            height:100vh;/*The body  will take the all screen seen byb the user*/
            justify-content:center;/*flex-direction:column this propriety represents the  vertical axe*/
            align-items:center;/*horizontle axe*/
            margin:0;/*i don't want the scroll whathever the sense*/
        }
           /*we remove the default color gave by the a tag*/
        a{
        color:grey;
        text-decoration:none;/*To remove the underline */
        }


        #classe{
            color:grey;
            padding:10px;
            width:50vw;
            display:flex;
            flex-direction:column;
            align-items:center;
            background-color:#AEC6CF;
        border-radius:15%;}

        #classe:hover{position:absolue;
                color:grey;
                text-decoraton:none}

     
      
        
        
        
        
        
    
        
    </style>
</head>
<body>
    <a href="/static/message_spent.html">Récapitulatif dépense</a>
    <!Dans mon body il  y aura le tableau des classes de  l'école>
    <main>
    <table>
        <!Je dis que je mets comme titre  à mon tableau nom des classe et ce titre et sur une ligne >
        <tr>
            <th>NOM DES CLASSES</th>
              
        </tr>
        <!The tag  will  serve me is like variable is tbody>
        <tbody id="liste_classes"></tbody>

        
        
    </table>
    </main>
    <script> 
    //It is the javascript method , this is the function who is predefined by javascript ,  i needn't put the instruction
        objectif=document.getElementById("liste_classes");
        //j'aurai appliqué un évenement si le tableau n'était pas ficde car il dépend d'un api 
        //mais le corps du tableau va subir une fonction 
            async function chargerClasses(){//car c'est une fonction qu'on va réutiliser 
                //récupération du token enrégistrés sur le front end 
                // const token=localStorage.getItem("mon_token"); on en a plus besoin car  utilise unn cookie sécurisé
                // je  n'ai rien à prendre du le front end à envoyé à part mon token que j'ai stocké 
                const envoie= await fetch("/classe_display",
                    {method:"GET",
                     
                     headers: {"Content-type": "application/json"},
                      //headers:{"authorization":token}  inutile d'envoyer mon token par l'header comme ça car il est sur mon header sécurisé dans un cookies dans le navigateur
                      credentials:"include"

                });//i decided to send my token on header who is encoded by HTTPS 
                     //reponse envoyé par le serveur 



                     // aucune erreur levé donc il yaura probablement des erreurs 500

                    const reponse = await envoie.json();
                    //localStorage.setItem("ma_classe_id",reponse.classe_id);
                    //pas besoin d'enregistrer un élément qui passe par l'url avec localStorage ou sessionStrorage il est déjà sauvegardé par l'url automatiquement 
                    // Bonfor this few i get resgistered  the element by url , so to take the value in browsher memory i need use window.search function ? 
                    objectif.innerHTML=" ";
                    for (let c of reponse)// l'object de la classe ramenait aussi id et class_id = classe.id  car c'estcette object qui est renvoyé par le serveur 
                    //obj_school_classe cette object ne contient pas classe_id car cest la table classe mais elle ontient classe.id=classe_id
                    {//je dois créer des lignes avec les noms de chaque classe 
                       objectif.innerHTML+=//pour faire la sonne de la page précédent à chaque fois qu'on ajoute un élément  
                    `<tr id="classe">
                         <td >
                         <a href ="page_presence.html?classe_id=${c.id}"">
                        ${c.classe_scolaire_norm}
                        </a>
                        </td> <!c'est le nom de chaque classe obtenue grâce  à a récupération de l'object obtenu avec toutes les classes >
                        
                        </tr>`;
                    };
}
window.onload = chargerClasses;
    </script>
</body>
</html>
